# JARVIS LLM Provider Configurations
# 설계 원칙: 모델 설정(엔드포인트, 모델명 등)은 여기서 관리, API 키는 .env에서 관리.

providers:
  local_ollama:
    name: "Ollama (Local)"
    url: "http://localhost:11434"
    model: "jarvis"
    keep_alive: "5m"
    is_local: true

  groq:
    name: "Groq Cloud"
    model: "mixtral-8x7b-32768"
    is_local: false

  claude_haiku:
    name: "Anthropic Claude"
    model: "claude-3-haiku-20240307"
    is_local: false
    cost_per_1k_input: 0.00025

  huggingface:
    name: "HuggingFace Inference"
    model: "mistralai/Mistral-7B-Instruct-v0.1"
    is_local: false

  openai_batch:
    name: "OpenAI Batch API"
    model: "gpt-4o-mini"
    is_local: false
    cost_per_1k_input: 0.00015
