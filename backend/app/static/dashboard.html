<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS OS - Command Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: rgba(23, 28, 38, 0.7);
            --accent-color: #00d2ff;
            --text-color: #e0e0e0;
            --success-color: #00ff88;
            --warning-color: #ffcc00;
            --error-color: #ff4d4d;
            --input-bg: rgba(40, 45, 55, 0.8);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--accent-color), #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            padding: 15px;
            flex: 1;
            overflow: hidden;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }

        /* 2. Pipeline Monitor */
        #pipeline-log {
            flex: 1;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            padding-right: 5px;
        }
        .log-entry { margin-bottom: 5px; border-left: 2px solid transparent; padding-left: 8px; }
        .log-time { color: #666; font-size: 0.7rem; margin-right: 5px; }
        .log-type-start { border-left-color: var(--accent-color); color: var(--accent-color); }
        .log-type-done { border-left-color: var(--success-color); }
        .log-type-error { border-left-color: var(--error-color); color: var(--error-color); }

        /* Command Prompt */
        .prompt-container {
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }
        #cmd-input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 15px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }
        #cmd-input:focus { border-color: var(--accent-color); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }
        #send-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 0 25px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        #send-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }

        /* Hide Scrollbar */
        #pipeline-log::-webkit-scrollbar { width: 4px; }
        #pipeline-log::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .health-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .status-dot { height: 8px; width: 8px; background-color: var(--success-color); border-radius: 50%; display: inline-block; margin-right: 5px; }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        td { padding: 8px 0; border-top: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <header>
        <h1>JARVIS COMMAND DASHBOARD</h1>
        <div id="clock">00:00:00</div>
    </header>

    <div class="dashboard-grid">
        <div class="card">
            <div class="panel-title">System Health</div>
            <div id="health-status">
                <div class="health-item"><span>Engine</span><span><span class="status-dot"></span>Online</span></div>
                <div class="health-item"><span>Active Skills</span><span id="active-skills-count">-</span></div>
                <div class="health-item"><span>Status</span><span id="system-status">Operational</span></div>
            </div>
        </div>

        <div class="card" style="grid-column: 2 / 3; grid-row: 1 / 3;">
            <div class="panel-title">Real-time Kernel Events</div>
            <div id="pipeline-log">
                <div class="log-entry" style="opacity: 0.5;">Waiting for system events...</div>
            </div>
        </div>

        <div class="card">
            <div class="panel-title">Confidence Trend</div>
            <canvas id="confidenceChart"></canvas>
        </div>

        <div class="card">
            <div class="panel-title">HITL Approval Queue</div>
            <div id="approval-queue" style="font-size: 0.8rem; opacity: 0.6; text-align: center; margin-top: 20px;">No pending approvals.</div>
        </div>

        <div class="card">
            <div class="panel-title">Skill Execution Log</div>
            <table><tbody id="skill-log-body"></tbody></table>
        </div>
    </div>

    <div class="prompt-container">
        <input type="text" id="cmd-input" placeholder="자비스에게 명령을 입력하세요 (예: '시스템 코드를 최적화해')" />
        <button id="send-btn">EXECUTE</button>
    </div>

    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        const logContainer = document.getElementById('pipeline-log');
        function addLog(message, type = '') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString('ko-KR', { hour12: false });
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // SSE Connection
        const evtSource = new EventSource("/api/dashboard/tasks/stream");
        evtSource.onmessage = (event) => {
            if (event.data === ": ping") return;
            const ev = JSON.parse(event.data);
            const type = ev.type;
            const d = ev.data;

            if (type === 'conductor_start') addLog(`>>> New Request: ${d.request}`, 'log-type-start');
            else if (type === 'agent_start') addLog(`${d.agent.toUpperCase()}: ${d.message}`);
            else if (type === 'step_start') addLog(`STEP [${d.action}]: ${d.step}`);
            else if (type === 'step_done') addLog(`STEP DONE: ${d.step} (${d.status})`, 'log-type-done');
            else if (type === 'conductor_done') addLog(`<<< FINISHED: ${d.message}`, 'log-type-done');
            else if (type.includes('error') || type.includes('fatal')) addLog(`ERROR: ${d.error}`, 'log-type-error');
        };

        // Command Submission
        const input = document.getElementById('cmd-input');
        const sendBtn = document.getElementById('send-btn');
        async function sendCommand() {
            const cmd = input.value.trim();
            if (!cmd) return;
            
            addLog(`UI_COMMAND: ${cmd}`, 'log-type-start');
            input.value = '';
            
            try {
                const res = await fetch('/api/dashboard/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                if (!res.ok) throw new Error('Command failed');
            } catch (e) {
                addLog(`UI_ERROR: ${e.message}`, 'log-type-error');
            }
        }
        sendBtn.onclick = sendCommand;
        input.onkeypress = (e) => { if (e.key === 'Enter') sendCommand(); };

        // Chart & Health Initialization
        const ctx = document.getElementById('confidenceChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['T1', 'T2', 'T3', 'T4', 'T5'],
                datasets: [{ label: 'Planner', borderColor: '#00d2ff', data: [0.95, 0.92, 0.94, 0.88, 0.91], fill: false, tension: 0.4 }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 0.5, max: 1 }, x: { display: false } } }
        });

        async function pollStatus() {
            try {
                const health = await fetch('/api/dashboard/health').then(r => r.json());
                document.getElementById('active-skills-count').innerText = health.active_skills;
            } catch(e) {}
        }
        setInterval(pollStatus, 5000);
        pollStatus();
    </script>
</body>
</html>
